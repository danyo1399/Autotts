name: CI

on:
  push:
    branches:
      - setup-autobot-tts-at1
      - main
  pull_request:
    branches:
      - setup-autobot-tts-at1
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run pytest -v
        env:
          WHISPER_MODEL: base
          WHISPER_DEVICE: cpu
